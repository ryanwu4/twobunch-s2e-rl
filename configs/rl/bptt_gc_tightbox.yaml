# Goal-conditioned BPTT (26-knob combined surrogate) with a TIGHTENED KNOB BOX.
# The validation + spike/knob-attribution study showed the policy railed the BC20 sextupole
# strengths (and other transverse knobs) to the union-box edges -> surrogate off-distribution ->
# RQS caustic + false-collinear beam Bmad didn't reproduce. Adding a matching/chromatic *objective*
# (bptt_gc_matched) did NOT fix it -- the policy games the surrogate's own (unreliable) BMAG.
# This config instead applies the DIRECT on-distribution guarantee: `knob_box: tightbox` clamps every
# knob to its tightbox bounds in the surrogate's normalized frame -- transverse knobs (sextupoles,
# FF, kickers, movers) are confined near golden (in-distribution, below the caustic threshold), while
# the longitudinal knobs stay full-range (tightbox==expanded there, so spacing exploration is intact).
# The agent physically cannot rail the sextupoles, regardless of what the surrogate rewards.
# Objectives = the combined set (good spacing tracking); matching terms intentionally omitted so this
# isolates the box effect. Re-add matching later once the box keeps the surrogate trustworthy there.
# Run with: --flow-ckpt trained/twobunch_combined_ft/checkpoints/best-epoch=493-val_loss=0.5126.ckpt
params:
  diff_env:
    name: TwoBunchFlowEnv
    episode_length: 64
    stochastic_env: true
    action_scale: 0.05
    rf_drift_std: 0.0
    common_random_numbers: false
    n_particles: 512
    knob_box: tightbox        # <-- clamp each knob to its tightbox bounds (in the union frame)
    # ---- reward inputs ----
    campaign_h5: processed/twobunch_combined.h5
    reward_norms_json: results/rl/_shared/norms/metric_norms_combined.json   # same objectives as combined
    surv_T_min: 0.9
    surv_margin: 0.05
    floor_pct: 10.0
    emit_below_weight: 1.0
    emit_gate_band: 0.2
    objectives:
      - {key: bunch_spacing,        kind: target,         weight: 1.0, goal: [1.0e-4, 3.0e-4]}
      - {key: T_drive,              kind: hinge,          weight: 2.0, hinge_at: 0.98}
      - {key: T_witness,            kind: hinge,          weight: 2.0, hinge_at: 0.98}
      - {key: drive_norm_emit_x,    kind: minimize_floor, weight: 1.0, floor_pct: 2}
      - {key: drive_norm_emit_y,    kind: minimize_floor, weight: 1.0, floor_pct: 2}
      - {key: witness_norm_emit_x,  kind: minimize_floor, weight: 0.5, floor_pct: 10}
      - {key: witness_norm_emit_y,  kind: minimize_floor, weight: 0.5, floor_pct: 10}
      - {key: transverse_offset,    kind: minimize,       weight: 0.5}
      - {key: angular_misalignment, kind: minimize,       weight: 0.5}
      - {key: knobs,                kind: boundary,       weight: 0.5, margin: 0.05}
  general:
    seed: 0
    device: cuda:0
    render: false
    train: true
    logdir: logs/bptt_gc_tightbox
  config:
    name: TwoBunchBPTT
    num_actors: 32
    steps_num: 32
    max_epochs: 200
    actor_learning_rate: 5e-4
    lr_schedule: linear
    gamma: 0.99
    obs_rms: true
    truncate_grads: true
    grad_norm: 1.0
    rew_scale: 1.0
    save_interval: 50
    betas: [0.7, 0.95]
    player:
      games_num: 64
      deterministic: false
  network:
    actor_mlp:
      units: [128, 128]
      activation: elu
    actor_logstd_init: -1.0
