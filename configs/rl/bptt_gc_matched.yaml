# Goal-conditioned BPTT (26-knob combined surrogate) WITH matching + chromatic objectives.
# Extends bptt_gc_combined.yaml by adding witness BMAG matching (bmag_x/y -> 1) and CHROMATIC
# matching (slice_bmag_max -> 1, i.e. all energy slices focused = chromaticity corrected). Rationale:
# the validation + spike/knob-attribution study showed the policy RAILED the BC20 sextupole strengths
# (S1/S2/S3ELkG) -- which the old reward didn't constrain -- driving the surrogate off-distribution
# into an RQS caustic (the witness leading-edge current spike) and a false-collinear beam that Bmad
# didn't reproduce. The sextupoles' physical job IS chromatic correction, so a chromatic/matching
# objective is directly sensitive to them: it's minimized near golden (in-distribution, no caustic)
# and penalizes railing -> restores "sextupole realism".
# Reliability: witness_bmag_x/y R^2 0.80/0.69 (good near matched, where this pulls); slice_bmag_max
# R^2 0.44 in magnitude but Spearman 0.88 -> use as a directional pull, not a precise target. Pair
# with DAgger + a tighter sextupole box later (the direct on-distribution guarantee).
# bunch-length (sigma_z) is stubbed below -- enable ONLY with the sextupoles constrained, because a
# short-bunch reward is the most caustic-gameable (the spike itself looks like a short bunch).
# Run with: --flow-ckpt trained/twobunch_combined_ft/checkpoints/best-epoch=493-val_loss=0.5126.ckpt
params:
  diff_env:
    name: TwoBunchFlowEnv
    episode_length: 64
    stochastic_env: true
    action_scale: 0.05
    rf_drift_std: 0.0
    common_random_numbers: false
    n_particles: 512
    # ---- reward inputs ----
    campaign_h5: processed/twobunch_combined.h5          # norms/floors source (26-knob union frame)
    reward_norms_json: results/rl/_shared/norms/metric_norms_matched.json   # separate cache (new objectives)
    # global defaults for objective entries that omit them
    surv_T_min: 0.9
    surv_margin: 0.05
    floor_pct: 10.0
    emit_below_weight: 1.0
    emit_gate_band: 0.2
    # ---- objectives: one reward term per entry; obs = these keys (+ per-env goals) -------------
    #   kind: target | minimize | maximize | ceiling | minimize_floor | hinge | boundary
    #   BMAG/slice-BMAG/sigma_z are log10-normalized (positive right-skewed) so a target=1 pull is
    #   well-scaled; target=1.0 on a BMAG means "matched" (log10(1)=0).
    objectives:
      - {key: bunch_spacing,        kind: target,         weight: 1.0, goal: [1.0e-4, 3.0e-4]}
      - {key: T_drive,              kind: hinge,          weight: 2.0, hinge_at: 0.98}
      - {key: T_witness,            kind: hinge,          weight: 2.0, hinge_at: 0.98}
      - {key: drive_norm_emit_x,    kind: minimize_floor, weight: 1.0, floor_pct: 2}
      - {key: drive_norm_emit_y,    kind: minimize_floor, weight: 1.0, floor_pct: 2}
      - {key: witness_norm_emit_x,  kind: minimize_floor, weight: 0.5, floor_pct: 10}
      - {key: witness_norm_emit_y,  kind: minimize_floor, weight: 0.5, floor_pct: 10}
      - {key: transverse_offset,    kind: minimize,       weight: 0.5}
      - {key: angular_misalignment, kind: minimize,       weight: 0.5}
      - {key: knobs,                kind: boundary,       weight: 0.5, margin: 0.05}
      # ---- matching (BMAG -> 1) : witness match to golden Twiss --------------------------------
      - {key: witness_bmag_x,       kind: target,         weight: 0.5, target: 1.0}
      - {key: witness_bmag_y,       kind: target,         weight: 0.5, target: 1.0}
      - {key: drive_bmag_x, kind: target, weight: 0.3, target: 1.0}
      - {key: drive_bmag_y, kind: target, weight: 0.3, target: 1.0}
      # ---- chromatic (all energy slices matched) : the term that pins the BC20 sextupoles -------
      - {key: witness_slice_bmag_max, kind: target,       weight: 0.75, target: 1.0}
      # ---- bunch length (enable LATER, sextupoles constrained; target not minimize -- caustic risk)
      # - {key: witness_sigma_z,    kind: target,         weight: 0.3, target: 6.0e-6}   # meters
  general:
    seed: 0
    device: cuda:0
    render: false
    train: true
    logdir: logs/bptt_gc_matched
  config:
    name: TwoBunchBPTT
    num_actors: 32
    steps_num: 32           # truncated BPTT horizon (memory; <= episode_length)
    max_epochs: 200
    actor_learning_rate: 5e-4
    lr_schedule: linear
    gamma: 0.99
    obs_rms: true
    truncate_grads: true
    grad_norm: 1.0
    rew_scale: 1.0
    save_interval: 50
    betas: [0.7, 0.95]
    player:
      games_num: 64
      deterministic: false
  network:
    actor_mlp:
      units: [128, 128]
      activation: elu
    actor_logstd_init: -1.0
