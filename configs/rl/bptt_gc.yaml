# Goal-conditioned BPTT over the two-bunch flow surrogate. Same env/reward as bptt.yaml, but the
# per-episode target bunch spacing is sampled in [spacing_goal_lo_m, spacing_goal_hi_m] and exposed
# to the policy as an extra obs column (so num_obs = N_KNOB + n_obs_extra = 16). The reward's spacing
# term tracks that per-env goal instead of the fixed 200 um. Clean machine (no RF drift) first, so the
# goal-tracking signal is not confounded; surrogate spacing R^2=0.996 over the campaign and 100-300 um
# is ~+-1 sigma of the campaign mean (204 um), i.e. interpolation. Norms cache is goal-independent,
# so metric_norms.json is reused unchanged.
params:
  diff_env:
    name: TwoBunchFlowEnv
    episode_length: 64
    stochastic_env: true
    action_scale: 0.05
    rf_drift_std: 0.0
    common_random_numbers: false
    n_particles: 512
    # ---- reward ----
    campaign_h5: processed/twobunch_flow_v4.h5
    reward_norms_json: results/rl/norms/metric_norms.json
    spacing_target_m: 2.0e-4     # eval/fallback default (used when goal range is absent)
    spacing_goal_lo_m: 1.0e-4    # 100 um -> goal-conditioned mode (both bounds present)
    spacing_goal_hi_m: 3.0e-4    # 300 um
    surv_T_min: 0.9
    surv_margin: 0.05
    floor_pct: 10.0
    emit_mode: minimize_floor
    emit_below_weight: 1.0
    emit_gate_band: 0.2
    w_spacing: 1.0
    w_emit: 1.0
    w_emit_witness: 0.5
    w_surv: 2.0
    w_ood: 0.5
    boundary_margin: 0.05
    w_collinearity: 0.0
  general:
    seed: 0
    device: cuda:0
    render: false
    train: true
    logdir: logs/bptt_gc
  config:
    name: TwoBunchBPTT
    num_actors: 32
    steps_num: 32           # truncated BPTT horizon (memory; <= episode_length)
    max_epochs: 200
    actor_learning_rate: 5e-4
    lr_schedule: linear
    gamma: 0.99
    obs_rms: true
    truncate_grads: true
    grad_norm: 1.0
    rew_scale: 1.0
    save_interval: 50
    betas: [0.7, 0.95]
    player:
      games_num: 64
      deterministic: false
  network:
    actor_mlp:
      units: [128, 128]
      activation: elu
    actor_logstd_init: -1.0
